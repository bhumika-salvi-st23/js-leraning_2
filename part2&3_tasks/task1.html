<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>switch example</title>
</head>
<style>
    body{
        margin: 0px;
        padding:0px
    }
    body.dark-theme{
        background-color: rgb(38, 0, 0);
        color: aliceblue;
    }
</style>
<body>
    <h1>
        welcome to my webpage
    </h1>
    <p>this is a simplle switcher example.</p>
    <button id="theme-btn">switch the btn</button>
    <script>
        const themeBtn = document.getElementById('theme-btn'); // fixed spelling

        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme'); // fixed spelling

            if (document.body.classList.contains('dark-theme')) {
                themeBtn.textContent = "Switch to Light";
            } else {
                themeBtn.textContent = "Switch to Dark";
            }
        });
    </script>
</body>

</html>
